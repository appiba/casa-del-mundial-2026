<section class="panel" id="acceso">

  <div class="panel-title">
    <span>ACCESO DE PARTICIPANTE</span>
    <h3>Ingresa a tu quiniela</h3>
  </div>

  <div class="auth-tabs">

    <button
      class="filter active"
      id="tabLogin"
      type="button"
    >
      Ya estoy inscrito
    </button>

    <button
      class="filter"
      id="tabRegistro"
      type="button"
    >
      Registrarme
    </button>

  </div>

  <!-- LOGIN -->

  <form id="loginForm">

    <div class="form-group">

      <label>
        Cédula / Usuario
      </label>

      <input
        type="text"
        id="loginCedula"
        required
      >

    </div>

    <div class="form-group">

      <label>
        Celular / Clave
      </label>

      <input
        type="text"
        id="loginCelular"
        required
      >

      <p class="mini-info">

        Tu clave es tu número celular
        SIN el 0 inicial.

        <br><br>

        Ejemplo:
        984530850

      </p>

    </div>

    <div class="form-group full">

      <button
        class="submit-btn"
        type="submit"
      >

        Ingresar a mi quiniela

      </button>

    </div>

  </form>

  <!-- REGISTRO -->

  <form
    id="registroForm"
    style="display:none;"
  >

    <div class="form-group">

      <label>Nombres</label>

      <input
        type="text"
        id="nombres"
        required
      >

    </div>

    <div class="form-group">

      <label>Apellidos</label>

      <input
        type="text"
        id="apellidos"
        required
      >

    </div>

    <div class="form-group">

      <label>Cédula</label>

      <input
        type="text"
        id="cedula"
        required
      >

    </div>

    <div class="form-group">

      <label>Celular</label>

      <input
        type="text"
        id="celular"
        required
      >

    </div>

    <div class="warning-box">

      ⚠️ Para participar por premios debes ingresar:

      <br><br>

      • Nombres reales<br>
      • Número de cédula único<br>
      • Número celular único

      <br><br>

      El sistema bloquea registros duplicados automáticamente.

    </div>

    <div class="form-group full">

      <button
        class="submit-btn"
        type="submit"
      >

        Registrarme

      </button>

    </div>

  </form>

</section>
